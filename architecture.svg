<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="380" viewBox="0 0 1100 380" role="img" aria-label="Architecture diagram: Tailscale client to exit node to gluetun to ProtonVPN">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 18px/1.2 'Segoe UI', Roboto, Arial; fill: #0b4870 }
      .label { font: 600 13px/1.2 'Segoe UI', Roboto, Arial; fill: #073049 }
      .small { font: 400 11px/1.2 'Segoe UI', Roboto, Arial; fill: #555 }
      .arrow { stroke: #2b2b2b; stroke-width:2.5; fill: none; marker-end: url(#arrowhead) }
      .net-label { font: 600 11px/1.2 'Segoe UI', Roboto, Arial; fill: #666 }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#2b2b2b" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#ffffff" />

  <!-- Title -->
  <text x="40" y="32" class="title">Architecture — Tailscale Exit Node via Gluetun (sg example)</text>

  <!-- vpnlink network band -->
  <rect x="330" y="60" width="580" height="180" rx="10" ry="10" fill="#f0f7ff" stroke="#a0c4e8" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="348" y="80" class="net-label">vpnlink (172.20.0.0/16) — static IPs aid Tailscale direct connections</text>

  <!-- Arrows -->
  <path d="M265 148 L338 148" class="arrow"/>
  <path d="M530 148 L618 148" class="arrow"/>
  <path d="M918 148 L988 148" class="arrow"/>

  <!-- Tailscale Client -->
  <g transform="translate(40,118)">
    <rect width="225" height="60" fill="#E8F5FF" stroke="#66B2FF" stroke-width="2" rx="8" ry="8" filter="url(#shadow)"/>
    <text x="15" y="25" class="label">Tailscale Client</text>
    <text x="15" y="42" class="small">Selects exit node (sg)</text>
  </g>

  <!-- SG Exit Node -->
  <g transform="translate(338,118)">
    <rect width="192" height="60" fill="#F0FFF4" stroke="#39B54A" stroke-width="2" rx="8" ry="8" filter="url(#shadow)"/>
    <text x="15" y="25" class="label">sg-exit-node</text>
    <text x="15" y="42" class="small">network: service:sg-gluetun</text>
  </g>

  <!-- Gluetun -->
  <g transform="translate(618,100)">
    <rect width="300" height="100" fill="#FFF8E6" stroke="#FF9F1C" stroke-width="2" rx="8" ry="8" filter="url(#shadow)"/>
    <text x="15" y="25" class="label">sg-gluetun (Gluetun)</text>
    <text x="15" y="44" class="small">WireGuard → ProtonVPN (SG)</text>
    <text x="15" y="61" class="small">172.20.0.2 on vpnlink</text>
    <text x="15" y="80" class="small">DNS: 100.100.100.100 (Tailscale MagicDNS)</text>
  </g>

  <!-- ProtonVPN -->
  <g transform="translate(988,118)">
    <rect width="90" height="60" fill="#F7E9FF" stroke="#9B59FF" stroke-width="2" rx="8" ry="8" filter="url(#shadow)"/>
    <text x="10" y="25" class="label">ProtonVPN</text>
    <text x="10" y="42" class="small">WireGuard</text>
  </g>

  <!-- Notes -->
  <text x="40" y="310" class="small">Each country gets its own Gluetun instance + Tailscale exit node. The exit node shares Gluetun's network namespace — all traffic routes through the VPN tunnel.</text>
  <text x="40" y="330" class="small">Static IPs on vpnlink help Tailscale establish direct connections between nodes and clients.</text>
</svg>
