<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0%" stop-color="#6CC0FF"/>
      <stop offset="100%" stop-color="#4D7CFF"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0%" stop-color="#7AF28C"/>
      <stop offset="100%" stop-color="#2ECC71"/>
    </linearGradient>
    <style>
      .title { font: 600 20px/1.2 'Segoe UI', Roboto, Arial; fill:#0f172a }
      .box-label { font: 500 13px/1.2 'Segoe UI', Roboto, Arial; fill:#0f172a }
      .note { font: 400 12px/1.2 'Segoe UI', Roboto, Arial; fill:#374151 }
      .box { rx:12; ry:12; stroke:#e6edf6; stroke-width:2 }
      .shadow { fill:rgba(15,23,42,0.06) }
      .arrow { stroke:#0f172a; stroke-width:2.5; fill:none; marker-end:url(#arrowhead) }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#0f172a" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="40" y="34" class="title">Architecture: Tailscale exit nodes tunneled via Gluetun & ProtonVPN</text>

  <!-- Tailscale Client -->
  <g>
    <rect x="470" y="60" width="260" height="56" fill="url(#g1)" class="box" />
    <text x="600" y="95" text-anchor="middle" class="box-label">Tailscale Client</text>
  </g>

  <!-- Exit nodes -->
  <g>
    <!-- SG Exit Node -->
    <rect x="160" y="150" width="240" height="72" fill="#FFF7ED" class="box" />
    <text x="280" y="180" class="box-label">sg-exit-node</text>
    <text x="280" y="198" class="note">(network_mode: service:sg-gluetun)</text>

    <!-- CA Exit Node -->
    <rect x="800" y="150" width="240" height="72" fill="#FFF7ED" class="box" />
    <text x="920" y="180" class="box-label">ca-exit-node</text>
    <text x="920" y="198" class="note">(network_mode: service:ca-gluetun)</text>
  </g>

  <!-- Gluetun containers -->
  <g>
    <!-- SG Gluetun -->
    <rect x="120" y="260" width="320" height="110" fill="url(#g2)" class="box" />
    <text x="280" y="295" class="box-label">sg-gluetun</text>
    <text x="280" y="313" class="note">WireGuard → ProtonVPN (Singapore)</text>

    <!-- CA Gluetun -->
    <rect x="760" y="260" width="320" height="110" fill="url(#g2)" class="box" />
    <text x="920" y="295" class="box-label">ca-gluetun</text>
    <text x="920" y="313" class="note">WireGuard → ProtonVPN (Canada)</text>
  </g>

  <!-- NextDNS resolver -->
  <g>
    <rect x="450" y="405" width="300" height="72" fill="#F0F9FF" class="box" />
    <text x="600" y="440" text-anchor="middle" class="box-label">nextdns (shared DNS)</text>
    <text x="600" y="458" text-anchor="middle" class="note">Used as DNS upstream by all Gluetun instances</text>
  </g>

  <!-- ProtonVPN Clouds -->
  <g>
    <ellipse cx="480" cy="330" rx="42" ry="30" fill="#FED7E2" />
    <text x="480" y="334" text-anchor="middle" class="box-label">ProtonVPN</text>
    <text x="480" y="350" text-anchor="middle" class="note">(WireGuard)</text>

    <ellipse cx="860" cy="330" rx="42" ry="30" fill="#FED7E2" />
    <text x="860" y="334" text-anchor="middle" class="box-label">ProtonVPN</text>
    <text x="860" y="350" text-anchor="middle" class="note">(WireGuard)</text>
  </g>

  <!-- Arrows: Client -> Exit Nodes -->
  <path class="arrow" d="M600 116 L300 150" />
  <path class="arrow" d="M600 116 L940 150" />

  <!-- Exit Node -> Gluetun (vertical arrows) -->
  <path class="arrow" d="M300 222 L280 260" />
  <path class="arrow" d="M940 222 L860 260" />

  <!-- Gluetun -> ProtonVPN -->
  <path class="arrow" d="M340 320 L522 320" />
  <path class="arrow" d="M760 320 L778 320" />

  <!-- Gluetun -> NextDNS -->
  <path class="arrow" d="M280 370 L600 405" />
  <path class="arrow" d="M920 370 L600 405" />

  <!-- Labels for flow -->
  <text x="420" y="140" class="note">Selects exit node</text>
  <text x="420" y="240" class="note">Exit node traffic shares Gluetun network namespace</text>

  <!-- Footer note -->
  <text x="40" y="520" class="note">Diagram: Tailscale client → Exit node container → Gluetun (WireGuard to ProtonVPN) → external VPN. NextDNS is configured as shared DNS upstream.</text>
</svg>
